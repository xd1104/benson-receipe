<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c2410c" />
  <title>我的食譜本</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1 class="brand">🍳 我的食譜本</h1>
      <nav class="tabs">
        <button class="tab active" data-view="list">食譜</button>
        <button class="tab" data-view="import">匯入整理</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- LIST VIEW -->
    <section id="view-list" class="view active">
      <div class="list-toolbar">
        <input id="search" class="search" type="search" placeholder="搜尋食譜或食材…" />
        <button id="btn-new" class="btn btn-primary">＋ 新增食譜</button>
      </div>
      <p id="readonly-note" class="readonly-note hidden">📖 唯讀瀏覽模式（資料來自 GitHub）。新增或編輯食譜請在電腦上操作。</p>
      <div id="filter-bar" class="chips filter-bar"></div>
      <div id="recipe-grid" class="grid"></div>
      <p id="empty-hint" class="empty-hint hidden">還沒有食譜，按「＋ 新增食譜」開始，或到「匯入整理」批次匯入。</p>
    </section>

    <!-- IMPORT VIEW -->
    <section id="view-import" class="view">
      <div class="card">
        <h2>批次匯入 .txt</h2>
        <p class="muted">選擇一個或多個雜亂的食譜文字檔，匯入後可以逐一用 AI 整理成結構化食譜。</p>
        <label class="filedrop">
          <input id="txt-input" type="file" accept=".txt,text/plain" multiple hidden />
          <span>點此選擇 .txt 檔（可多選）</span>
        </label>
        <div id="import-status" class="muted"></div>
      </div>
      <div id="import-list" class="import-list"></div>

      <div class="card">
        <h2>備份 / 還原</h2>
        <p class="muted">匯出會下載一個含「所有食譜＋圖片」的 JSON 備份檔。還原會用備份內容覆蓋同名食譜。</p>
        <div class="tag-add-row" style="margin-top:4px">
          <button id="btn-export" class="btn btn-primary" type="button">⬇ 匯出全部備份</button>
          <label class="btn btn-ghost">
            ⬆ 還原備份
            <input id="restore-input" type="file" accept="application/json,.json" hidden />
          </label>
        </div>
        <div id="backup-status" class="muted"></div>
      </div>
    </section>
  </main>

  <!-- EDITOR MODAL -->
  <div id="editor" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="editor-title">新增食譜</h2>
        <button id="editor-close" class="icon-btn" aria-label="關閉">✕</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span>標題</span>
          <input id="f-title" type="text" placeholder="例：番茄炒蛋" />
        </label>
        <div class="field">
          <span>標籤（點選即可，可複選）</span>
          <div id="f-tags-chips" class="chips"></div>
          <div class="tag-add-row">
            <input id="f-newtag" type="text" placeholder="打新標籤名稱…" />
            <button id="f-newtag-btn" class="btn btn-ghost" type="button">＋ 新增</button>
            <button id="f-managetags-btn" class="btn btn-ghost" type="button">管理標籤</button>
          </div>
        </div>
        <div class="field">
          <span>圖片</span>
          <div class="img-row">
            <img id="f-img-preview" class="img-preview hidden" alt="預覽" />
            <label class="btn btn-ghost">
              選擇圖片
              <input id="f-image" type="file" accept="image/*" hidden />
            </label>
            <button id="f-img-clear" class="btn btn-ghost hidden" type="button">移除圖片</button>
          </div>
        </div>
        <div class="field">
          <span>食材</span>
          <div id="f-ingredients-list" class="row-list" data-kind="ing"></div>
          <button id="f-add-ing" class="btn btn-ghost add-row-btn" type="button">＋ 加一項食材</button>
        </div>
        <div class="field">
          <span>步驟</span>
          <div id="f-steps-list" class="row-list" data-kind="step"></div>
          <button id="f-add-step" class="btn btn-ghost add-row-btn" type="button">＋ 加一步</button>
        </div>
        <label class="field">
          <span>備註</span>
          <textarea id="f-notes" rows="3" placeholder="小訣竅、份量、來源…"></textarea>
        </label>
      </div>
      <div class="modal-foot">
        <button id="editor-delete" class="btn btn-danger hidden">刪除</button>
        <div class="spacer"></div>
        <button id="editor-cancel" class="btn btn-ghost">取消</button>
        <button id="editor-save" class="btn btn-primary">儲存</button>
      </div>
    </div>
  </div>

  <!-- READING MODE MODAL -->
  <div id="reader" class="modal reader-modal hidden">
    <div class="modal-card reader-card">
      <div class="modal-head">
        <h2 id="reader-title">食譜</h2>
        <button id="reader-close" class="icon-btn" aria-label="關閉">✕</button>
      </div>
      <div class="modal-body reader-body">
        <img id="reader-cover" class="reader-cover hidden" alt="封面" />
        <div id="reader-tags" class="reader-tags"></div>
        <h3 class="reader-h">食材</h3>
        <ul id="reader-ings" class="reader-ings"></ul>
        <h3 class="reader-h">步驟</h3>
        <ol id="reader-steps" class="reader-steps"></ol>
        <div id="reader-notes-wrap" class="hidden">
          <h3 class="reader-h">備註</h3>
          <p id="reader-notes" class="reader-notes"></p>
        </div>
      </div>
      <div class="modal-foot">
        <div class="spacer"></div>
        <button id="reader-edit" class="btn btn-primary">✎ 編輯</button>
      </div>
    </div>
  </div>

  <!-- MANAGE TAGS MODAL -->
  <div id="tagmgr" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2>管理標籤</h2>
        <button id="tagmgr-close" class="icon-btn" aria-label="關閉">✕</button>
      </div>
      <div class="modal-body">
        <p class="muted">改名或刪除標籤時，會自動同步更新所有用到它的食譜。</p>
        <div id="tagmgr-list" class="tagmgr-list"></div>
        <div class="tag-add-row" style="margin-top:14px">
          <input id="tagmgr-new" type="text" placeholder="新增一個標籤選項…" />
          <button id="tagmgr-add" class="btn btn-primary" type="button">新增</button>
        </div>
      </div>
      <div class="modal-foot">
        <div class="spacer"></div>
        <button id="tagmgr-done" class="btn btn-primary">完成</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
