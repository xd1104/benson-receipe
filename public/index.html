<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#c2410c" />
  <title>我的食譜本</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1 class="brand">🍳 我的食譜本</h1>
      <nav class="tabs">
        <button class="tab active" data-view="list">食譜</button>
        <button class="tab" data-view="import">匯入整理</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- LIST VIEW -->
    <section id="view-list" class="view active">
      <div class="list-toolbar">
        <input id="search" class="search" type="search" placeholder="搜尋食譜或食材…" />
        <button id="btn-new" class="btn btn-primary">＋ 新增食譜</button>
      </div>
      <div id="recipe-grid" class="grid"></div>
      <p id="empty-hint" class="empty-hint hidden">還沒有食譜，按「＋ 新增食譜」開始，或到「匯入整理」批次匯入。</p>
    </section>

    <!-- IMPORT VIEW -->
    <section id="view-import" class="view">
      <div class="card">
        <h2>批次匯入 .txt</h2>
        <p class="muted">選擇一個或多個雜亂的食譜文字檔，匯入後可以逐一用 AI 整理成結構化食譜。</p>
        <label class="filedrop">
          <input id="txt-input" type="file" accept=".txt,text/plain" multiple hidden />
          <span>點此選擇 .txt 檔（可多選）</span>
        </label>
        <div id="import-status" class="muted"></div>
      </div>
      <div id="import-list" class="import-list"></div>
    </section>
  </main>

  <!-- EDITOR MODAL -->
  <div id="editor" class="modal hidden">
    <div class="modal-card">
      <div class="modal-head">
        <h2 id="editor-title">新增食譜</h2>
        <button id="editor-close" class="icon-btn" aria-label="關閉">✕</button>
      </div>
      <div class="modal-body">
        <label class="field">
          <span>標題</span>
          <input id="f-title" type="text" placeholder="例：番茄炒蛋" />
        </label>
        <label class="field">
          <span>標籤（逗號分隔）</span>
          <input id="f-tags" type="text" placeholder="快炒, 家常" />
        </label>
        <div class="field">
          <span>圖片</span>
          <div class="img-row">
            <img id="f-img-preview" class="img-preview hidden" alt="預覽" />
            <label class="btn btn-ghost">
              選擇圖片
              <input id="f-image" type="file" accept="image/*" hidden />
            </label>
            <button id="f-img-clear" class="btn btn-ghost hidden" type="button">移除圖片</button>
          </div>
        </div>
        <label class="field">
          <span>食材（每行一項）</span>
          <textarea id="f-ingredients" rows="6" placeholder="番茄 2 顆&#10;蛋 3 顆&#10;鹽 少許"></textarea>
        </label>
        <label class="field">
          <span>步驟（每行一步）</span>
          <textarea id="f-steps" rows="8" placeholder="蛋打散加少許鹽&#10;熱鍋下油炒蛋盛起&#10;炒番茄後回鍋拌炒"></textarea>
        </label>
        <label class="field">
          <span>備註</span>
          <textarea id="f-notes" rows="3" placeholder="小訣竅、份量、來源…"></textarea>
        </label>
      </div>
      <div class="modal-foot">
        <button id="editor-delete" class="btn btn-danger hidden">刪除</button>
        <div class="spacer"></div>
        <button id="editor-cancel" class="btn btn-ghost">取消</button>
        <button id="editor-save" class="btn btn-primary">儲存</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/app.js"></script>
</body>
</html>
